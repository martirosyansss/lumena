<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" role="img" aria-label="MedBridge Tourism">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Onest:wght@600;800&amp;display=swap');
      .mb-word{font-family:'Onest','Segoe UI',system-ui,sans-serif;font-weight:800;letter-spacing:-1.5px;}
      .mb-sub{font-family:'Onest','Segoe UI',system-ui,sans-serif;font-weight:600;letter-spacing:6px;}
    </style>
    <linearGradient id="mbHeart" x1="50" y1="12" x2="50" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8FB1"/>
      <stop offset="0.5" stop-color="#FF8A5B"/>
      <stop offset="1" stop-color="#F4A24C"/>
    </linearGradient>
    <linearGradient id="mbWord" x1="150" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF7E8F"/>
      <stop offset="1" stop-color="#F4882F"/>
    </linearGradient>
    <filter id="mbShadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#B4541E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ICON: heart + bridge arch -->
  <g transform="translate(14,26) scale(1.10)" filter="url(#mbShadow)">
    <path fill="url(#mbHeart)" d="M50 86C18 64 14 44 14 34C14 22 24 16 33 16C41 16 47 21 50 27C53 21 59 16 67 16C76 16 86 22 86 34C86 44 82 64 50 86Z"/>
    <g fill="#ffffff" stroke="#ffffff" stroke-linecap="round">
      <path d="M27 61 Q50 36 73 61" fill="none" stroke-width="5.2"/>
      <rect x="24" y="60.4" width="52" height="5.2" rx="2.6" stroke="none"/>
      <path d="M40 61 V51 M60 61 V51" stroke-width="3.3"/>
      <rect x="28.8" y="64" width="4.8" height="9" rx="2.4" stroke="none"/>
      <rect x="66.4" y="64" width="4.8" height="9" rx="2.4" stroke="none"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <text class="mb-word" x="150" y="68" font-size="58" dominant-baseline="central" text-anchor="start">
    <tspan fill="url(#mbWord)">Med</tspan><tspan fill="#0A2A4A">Bridge</tspan>
  </text>
  <text class="mb-sub" x="152" y="112" font-size="21" fill="#F4882F" text-anchor="start">TOURISM</text>
</svg>
