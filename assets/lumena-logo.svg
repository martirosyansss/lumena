<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-label="LUMENA">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Onest:wght@800&amp;display=swap');
      .lm-word{font-family:'Onest','Golos Text','Segoe UI',system-ui,sans-serif;font-weight:800;letter-spacing:-1.5px;}
    </style>
    <!-- icon gradients (local icon space 0..100) -->
    <linearGradient id="lmV" x1="50" y1="6" x2="50" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7B85F"/>
      <stop offset="0.5" stop-color="#F4A24C"/>
      <stop offset="1" stop-color="#E89A3C"/>
    </linearGradient>
    <linearGradient id="lmH" x1="6" y1="50" x2="94" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3AA6C2"/>
      <stop offset="0.5" stop-color="#1E5F74"/>
      <stop offset="1" stop-color="#103140"/>
    </linearGradient>
    <!-- wordmark gradient -->
    <linearGradient id="lmWord" x1="152" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34A7C4"/>
      <stop offset="1" stop-color="#1E5F74"/>
    </linearGradient>
    <clipPath id="lmHtop"><rect x="50" y="36" width="14" height="14"/><rect x="36" y="50" width="14" height="14"/></clipPath>
    <filter id="lmShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#0F2E3D" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- ICON: interlocking rounded medical cross -->
  <g transform="translate(16,24) scale(1.12)" filter="url(#lmShadow)">
    <!-- horizontal link (cool) drawn first -->
    <rect x="6" y="36" width="88" height="28" rx="14" fill="url(#lmH)"/>
    <!-- vertical link (warm) over it -->
    <rect x="36" y="6" width="28" height="88" rx="14" fill="url(#lmV)"/>
    <!-- weave: bring horizontal back on top at TR + BL quadrants -->
    <g clip-path="url(#lmHtop)">
      <rect x="6" y="36" width="88" height="28" rx="14" fill="url(#lmH)"/>
    </g>
    <!-- weave seams: soft ridges to read over/under -->
    <path d="M50 36 V64 M36 50 H64" stroke="#FBF8F3" stroke-opacity="0.22" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- WORDMARK -->
  <text class="lm-word" x="152" y="82" font-size="78" dominant-baseline="central" text-anchor="start">
    <tspan fill="url(#lmWord)">LUM</tspan><tspan fill="#0F2E3D">ENA</tspan>
  </text>
</svg>
