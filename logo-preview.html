<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MedBridge Tourism — логотип (превью)</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1E5F74; --navy:#0F2E3D; --amber:#F4A24C; --gold:#E8C27A;
    --bg:#FBF8F3; --surface:#fff; --border:#EAE4DA; --text:#0F2E3D; --muted:#3E4A52;
  }
  *{box-sizing:border-box;margin:0}
  body{font-family:'Onest',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:48px 24px;line-height:1.5}
  .wrap{max-width:1040px;margin:0 auto;display:grid;gap:28px}
  h1{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .sub{color:var(--muted);margin-top:-18px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:14px;align-items:flex-start;box-shadow:0 6px 20px rgba(15,46,61,.06)}
  .card.dark{background:var(--navy);border-color:#13384a}
  .card.warm{background:linear-gradient(135deg,#FBEAD2,#FBF8F3)}
  .tag{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .card.dark .tag{color:#9fb4bd}
  .logo-lg{width:340px;max-width:100%}
  .logo-md{width:230px;max-width:100%}
  .row{display:flex;align-items:center;gap:28px;flex-wrap:wrap}
  .mark{width:84px;height:84px}
  .mark-sm{width:48px;height:48px}
  .mark-xs{width:28px;height:28px}
  .fav{display:flex;align-items:center;gap:16px}
  .chip{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:8px 16px;font-weight:700;color:var(--navy)}
  .chip img{width:24px;height:24px}
  .swatches{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:64px;height:64px;border-radius:14px;display:flex;align-items:flex-end;padding:6px;font-size:10px;font-weight:700;color:#fff;border:1px solid rgba(0,0,0,.06)}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>MedBridge Tourism — логотип</h1>
    <p class="sub">Сердце-мост: сердце заботы держит арочный мост + двухцветный леттеринг (Onest 800)</p>
  </div>

  <div class="grid">
    <div class="card">
      <span class="tag">На светлом фоне</span>
      <img class="logo-lg" src="assets/medbridge-logo.png" alt="MedBridge Tourism">
    </div>
    <div class="card dark">
      <span class="tag">На тёмном фоне</span>
      <img class="logo-lg" src="assets/medbridge-logo.png" alt="MedBridge Tourism" style="filter:brightness(0) invert(1) opacity(.0)">
      <!-- dark version: показываем марку + белый текст -->
      <div class="row" style="margin-top:-58px">
        <img class="mark" src="assets/medbridge-logo-mark.png" alt="">
        <span style="font-size:46px;font-weight:800;letter-spacing:-1.5px;color:#fff">Med<span style="color:#7FC7DA">Bridge</span></span>
      </div>
    </div>
    <div class="card warm">
      <span class="tag">Тёплая подложка</span>
      <img class="logo-md" src="assets/medbridge-logo.png" alt="MedBridge Tourism">
    </div>
    <div class="card">
      <span class="tag">Иконка-марка / favicon</span>
      <div class="row">
        <img class="mark" src="assets/medbridge-logo-mark.png" alt="">
        <img class="mark-sm" src="assets/medbridge-logo-mark.png" alt="">
        <img class="mark-xs" src="assets/medbridge-logo-mark.png" alt="">
      </div>
      <div class="fav" style="margin-top:8px">
        <span class="chip"><img src="assets/medbridge-logo-mark.png" alt="">MedBridge Tourism</span>
      </div>
    </div>
  </div>

  <div class="card">
    <span class="tag">Палитра</span>
    <div class="swatches">
      <div class="sw" style="background:#F4A24C;color:#0F2E3D">#F4A24C</div>
      <div class="sw" style="background:#1E5F74">#1E5F74</div>
      <div class="sw" style="background:#0F2E3D">#0F2E3D</div>
      <div class="sw" style="background:#2E8AA6">#2E8AA6</div>
      <div class="sw" style="background:#E8C27A;color:#0F2E3D">#E8C27A</div>
    </div>
  </div>
</div>
</body>
</html>
